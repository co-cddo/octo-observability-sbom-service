services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sbom
      POSTGRES_PASSWORD: sbom
      POSTGRES_DB: sbom_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbom"]
      interval: 5s
      timeout: 3s
      retries: 5

  oidc-mock:
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    ports:
      - "8090:8090"
    environment:
      SERVER_PORT: "8090"
      JSON_CONFIG: >
        {
          "interactiveLogin": true,
          "httpServer": "NettyWrapper",
          "tokenCallbacks": [
            {
              "issuerId": "default",
              "tokenExpiry": 3600,
              "requestMappings": [
                {
                  "requestParam": "grant_type",
                  "match": "authorization_code",
                  "claims": {
                    "sub": "test-user-001",
                    "email": "test@example.com",
                    "name": "Test User"
                  }
                }
              ]
            }
          ]
        }
    healthcheck:
      test: ["CMD", "java", "-version"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 20s

  sbom-service:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      oidc-mock:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: "3000"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USER: sbom
      DATABASE_PASSWORD: sbom
      DATABASE_NAME: sbom_service
      S3_BUCKET_NAME: vodg-sbom-local
      S3_REGION: eu-west-2
      S3_ENDPOINT: http://localstack:4566
      OIDC_ISSUER_URL: http://oidc-mock:8090/default
      OIDC_CLIENT_ID: sbom-service
      OIDC_CLIENT_SECRET: sbom-secret
      OIDC_REDIRECT_URI: http://localhost:3000/auth/callback
      SESSION_SECRET: local-dev-session-secret-minimum-32-chars

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: eu-west-2
    volumes:
      - localstack_data:/var/lib/localstack

  adminer:
    image: adminer
    depends_on:
      - postgres
    ports:
      - "8080:8080"

volumes:
  postgres_data:
  localstack_data:
